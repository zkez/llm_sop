# 复制为 configs/steps.yaml 后替换成你的真实操作步骤。

steps:
  - id: step_01
    name: 安装滤芯
    descriptions:
      - 操作人员将滤芯对准安装槽，并把滤芯完整插入到固定位置。
      - 视频片段中可以看到滤芯被推入支架，最终稳定地固定在设备中。
      - 该步骤完成时，滤芯已经就位，操作人员的手离开滤芯或安装区域。
    negative_notes:
      - 只是拿起滤芯但没有安装，不算完成。
      - 滤芯只出现在画面中，不算完成。

  - id: step_02
    name: 拧紧阀门
    descriptions:
      - 操作人员使用扳手或手柄拧紧目标阀门。
      - 视频片段中能看到阀门被旋转，且拧紧动作已经完成。
      - 步骤结束时，工具或手离开阀门，阀门处于已锁紧状态。
    negative_notes:
      - 只是触碰阀门但没有旋转，不算完成。
      - 只是拿起扳手，不算完成。

  - id: step_03
    name: 检查显示屏状态
    descriptions:
      - 操作人员查看设备显示屏，确认屏幕上的状态信息。
      - 视频片段中可以看到人员把注意力集中在显示屏或控制面板上。
      - 该步骤完成时，操作人员已经完成对显示屏状态的检查。
    negative_notes:
      - 显示屏短暂出现在背景里，不算完成。
      - 操作人员只是路过设备，不算完成。
